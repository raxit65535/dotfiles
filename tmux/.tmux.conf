##### Terminal setup
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
set -g terminal-overrides '*:Ss=0:Se=0'
set -g history-limit 100000
set -s escape-time 0
set -g xterm-keys on
set -g extended-keys on

##### Prefix key
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

##### Status bar
set -g status on
set -g status-position bottom
set -g status-style "bg=#1f1f22,fg=#b7bfc6"
set -g status-left-length 40
set -g status-left "#[bold,fg=#c5d1dd] #S #[default,fg=#7d8490]| "
set -g status-right '#{?window_zoomed_flag,[Z] ,}#(tmux ls 2>/dev/null | wc -l | tr -d " ")s #{window_panes}p'
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold][#I:#W]#[default] "
setw -g window-status-style "fg=#7d8490"
setw -g window-status-current-style "fg=#c5d1dd"
set -g automatic-rename off
set -g allow-rename off

##### Window and pane numbering
set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

##### Pane borders
set -g pane-border-style "fg=#3a3f45"
set -g pane-active-border-style "fg=#5e8fc4"
set -g pane-border-status top
set -g pane-border-format ' #[bold]#P #T#[default] '

##### Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Mouse support
set -g mouse on
setw -g aggressive-resize on

##### Copy mode (vi)
set-window-option -g mode-keys vi
bind [ copy-mode
set -g mode-style bg=yellow,fg=black
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi / send-keys -X search-forward
bind -T copy-mode-vi ? send-keys -X search-backward

##### Pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

##### Window switching
bind \; last-window
bind -r 1 select-window -t :1
bind -r 2 select-window -t :2
bind -r 3 select-window -t :3
bind -r 4 select-window -t :4
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5

##### Splits
bind | split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind - split-window -v -c "#{pane_current_path}" \; select-layout even-vertical

##### Window management
bind c new-window -c "#{pane_current_path}"
bind & confirm-before -p "Kill window #W? (y/n)" kill-window
unbind x
bind x kill-pane
bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window -- '%%'"
bind s choose-tree -Zs

##### Session management
bind L switch-client -l
bind N command-prompt -p "New session name:" "new-session -d -s '%%' -c '#{pane_current_path}'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

##### Pane utilities
bind z resize-pane -Z
bind m select-pane -m
bind E setw synchronize-panes
bind Q display-message "Pane layout: #{window_layout}"
bind q display-panes
bind ? list-keys

##### Popup window - Floating terminal within tmux
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"   # quick scratch shell without leaving context
# bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"  # swap for lazygit if you use it
bind H display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "zsh -lc 'printf \"%s\\n\" \"Sessions:\" \"  C-a s  choose-tree\" \"  C-a L  last session\" \"Windows:\" \"  M-1..M-4 switch windows\" \"Workflow:\" \"  feature-open <repo> <feature>\" \"  cop <session> <path>\" \"  uncop <session> --worktree\" \"Review:\" \"  C-a R  open review-shell here\"; printf \"\\nPress Enter to close...\"; read -r _'"
bind R new-window -n review-shell -c "#{pane_current_path}" "zsh -lc 'printf \"%s\\n\" \"Review commands:\" \"  git log --oneline main..HEAD\" \"  git diff --stat main...HEAD\" \"  git diff main...HEAD | delta\" \"  git show <hash> | delta\"; printf \"\\n\"; exec zsh'"

##### Word navigation
bind -n M-Left send-keys M-b
bind -n M-Right send-keys M-f

##### Mark panes
bind m select-pane -m

##### Sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

