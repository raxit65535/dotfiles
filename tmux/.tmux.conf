##### Terminal setup
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
set -g terminal-overrides '*:Ss=0:Se=0'
set -g history-limit 10000
set -s escape-time 0
set -g xterm-keys on

##### Prefix key
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

##### Status bar (soothing colors, simple info)
set -g status on
set -g status-position bottom
set -g status-style "bg=#1f1f22,fg=#b7bfc6"

# Session name on the left
set -g status-left "#[bold] #S #[default]"

# Right: zoom flag (subtle), pane count, user@host, date/time
# set -g status-right '#{?window_zoomed_flag, [Z] ,}Panes:#{window_panes} #(whoami)@#H | %Y-%m-%d %H:%M '

set -g status-right '#{?window_zoomed_flag, [Z] ,}Panes:#{window_panes}'

# Windows as plain numbers
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold][#I:#W]#[default] "
setw -g window-status-style "fg=#7d8490"
setw -g window-status-current-style "fg=#c5d1dd"

# Set auto renaming of windows off to stik with manual renames
set -g automatic-rename off
set -g allow-rename off

##### Window and pane numbering
set -g base-index 1
set-window-option -g pane-base-index 1

##### Pane borders (clear, numbered, soothing)
set -g pane-border-style "fg=#3a3f45"
set -g pane-active-border-style "fg=#3a3f45"

set -g pane-border-status top
# Show only pane number and optional ★ when marked
# set -g pane-border-format ' #[bold]#P#{?pane_marked_flag, #[fg=#d7c98b]★,}#[default] '

##### Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Mouse support
set -g mouse on
setw -g aggressive-resize on

##### Vim-style copy-mode with highlighted selection
set-window-option -g mode-keys vi
bind [ copy-mode
set -g mode-style bg=yellow,fg=black
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

##### Pane navigation (vim-style + LRU)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Last window moved to P-L (not near &)
bind \; last-window

# Switch between last two panes in current window
# bind \; last-pane

##### Splits with auto-balancing
# Horizontal (side-by-side)
bind | split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal

# Vertical (stacked)
bind - split-window -v -c "#{pane_current_path}" \; select-layout even-vertical

##### Window management
# P-c: NEW WINDOW (as you wanted)
bind c new-window -c "#{pane_current_path}"

bind & confirm-before -p "Kill window #W? (y/n)" kill-window

# Kill pane instantly (no y/n)
unbind x
bind x kill-pane

bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window -- '%%'"
bind s choose-tree

##### Clipboard paste from macOS
# unbinding pdpaste becaue ctrl + a + p is for opening previous window
#bind p run-shell "tmux set-buffer \"\$(pbpaste)\"; tmux paste-buffer"

#### AI Shortcuts
# Last session toggle (like last-window but for sessions) (ctrl + a + L)
bind L switch-client -l

# Show all session names in status, current one highlighted
set -g status-left-length 40
set -g status-left "#[bold,fg=#c5d1dd] #S #[default,fg=#7d8490]| "

# In status-right, show count of detached sessions so you remember they exist
set -g status-right '#{?window_zoomed_flag,[Z] ,}#(tmux ls 2>/dev/null | wc -l | tr -d " ")s #{window_panes}p'

##### Word navigation with Option+Arrow
bind -n M-Left send-keys M-b
bind -n M-Right send-keys M-f

##### Zoom current pane
bind z resize-pane -Z   # status-right shows [Z] when zoomed

##### Pin / mark panes you never want to close
bind m select-pane -m   # toggles ★ in pane border

##### Utilities
bind ? list-keys
bind Q display-message "Pane layout: #{window_layout}"
bind q display-panes

##### Optional: custom sessionizer script
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
